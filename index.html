<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Data Center — Global Surveillance Network</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #050a14; font-family: 'Courier New', monospace; color: #c8d8f0; overflow: hidden; height: 100vh; }
#globe-container { width: 100vw; height: 100vh; }

/* ── STATS BAR ── */
#stats-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(5,10,20,0.80);
  border-top: 1px solid rgba(40,80,160,0.3);
  display: flex; padding: 8px 28px; gap: 36px;
  backdrop-filter: blur(6px); z-index: 10;
}
.stat { display: flex; flex-direction: column; gap: 1px; }
.stat-val { font-size: 16px; color: #5bf; font-weight: 700; letter-spacing: 1px; }
.stat-lbl { font-size: 9px; color: rgba(100,150,200,0.5); letter-spacing: 2px; text-transform: uppercase; }

/* ── LOGO ── */
#logo { position: fixed; top: 18px; left: 24px; z-index: 10; }
#logo h1 {
  display: flex; align-items: center; gap: 12px;
  font-size: 22px; font-weight: 700; letter-spacing: 3px;
  color: #5bf; text-transform: uppercase;
}
#logo p { font-size: 10px; color: rgba(100,160,220,0.5); letter-spacing: 3px; margin-top: 2px; text-transform: uppercase; }

#selected-country-name {
  display: inline-flex; align-items: center;
  min-height: 28px; padding: 6px 12px;
  border: 1px solid rgba(115,190,255,0.3); border-radius: 999px;
  background: rgba(8,18,32,0.62);
  color: rgba(225,241,255,0.9); font-size: 11px;
  letter-spacing: 1.6px; text-transform: none;
}

/* ── LAYER PANEL ── */
#layer-panel {
  position: fixed; top: 92px; left: 24px; z-index: 10;
  display: grid; gap: 10px;
  width: min(260px, calc(100vw - 48px));
}

.layer-tile {
  position: relative;
  display: grid; grid-template-columns: auto 1fr auto;
  align-items: center; gap: 10px;
  width: 100%; padding: 11px 14px;
  border: 1px solid rgba(120,180,255,0.22); border-radius: 14px;
  background: linear-gradient(135deg, rgba(11,20,36,0.72), rgba(18,39,74,0.34));
  box-shadow: 0 8px 24px rgba(0,0,0,0.22);
  backdrop-filter: blur(14px); color: #dcecff;
  cursor: pointer;
  transition: transform 0.22s ease, border-color 0.22s ease, background 0.22s ease, opacity 0.22s ease;
}
.layer-tile:hover { transform: translateX(4px); border-color: rgba(120,190,255,0.5); }
.layer-tile.is-off { opacity: 0.52; background: linear-gradient(135deg, rgba(8,14,24,0.5), rgba(10,22,40,0.24)); }

.tile-emoji {
  width: 38px; height: 38px;
  display: grid; place-items: center;
  border-radius: 10px; background: rgba(255,255,255,0.08); font-size: 20px;
}
.tile-copy { display: grid; gap: 2px; text-align: left; }
.tile-title { font-size: 11px; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase; }
.tile-meta { font-size: 9px; color: rgba(185,214,255,0.65); letter-spacing: 1px; }
.tile-state {
  min-width: 46px; padding: 5px 8px; border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.16); background: rgba(255,255,255,0.06);
  font-size: 9px; font-weight: 700; letter-spacing: 1.8px;
  text-transform: uppercase; text-align: center;
}

.tile-action-btn {
  margin-top: 5px; width: fit-content;
  padding: 4px 9px; border-radius: 999px;
  border: 1px solid rgba(128,220,255,0.45); background: rgba(54,132,168,0.28);
  color: #bfefff; font-size: 9px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
}
.tile-action-btn:hover { background: rgba(74,168,214,0.42); border-color: rgba(140,224,255,0.8); }
.tile-action-btn.is-active { background: rgba(64,219,153,0.22); border-color: rgba(90,255,194,0.8); color: #c8ffe9; }

/* ── COUNTRY DETAIL PANEL (right) ── */
#country-panel {
  position: fixed; top: 0; right: -380px; bottom: 0;
  width: 360px; z-index: 20;
  background: linear-gradient(180deg, rgba(5,12,28,0.97) 0%, rgba(8,18,40,0.97) 100%);
  border-left: 1px solid rgba(80,160,255,0.22);
  backdrop-filter: blur(18px);
  display: flex; flex-direction: column; gap: 0;
  transition: right 0.38s cubic-bezier(0.22,0.61,0.36,1);
  overflow-y: auto;
}
#country-panel.visible { right: 0; }

#cp-close {
  position: absolute; top: 16px; right: 16px;
  width: 32px; height: 32px; border-radius: 50%;
  border: 1px solid rgba(100,160,255,0.3); background: rgba(20,40,80,0.5);
  color: #7ab4ff; font-size: 16px; cursor: pointer;
  display: grid; place-items: center;
  transition: background 0.2s, border-color 0.2s;
}
#cp-close:hover { background: rgba(40,80,160,0.6); border-color: rgba(140,200,255,0.6); }

#cp-header {
  padding: 28px 24px 20px;
  border-bottom: 1px solid rgba(60,120,220,0.18);
}
#cp-flag { font-size: 48px; line-height: 1; margin-bottom: 10px; }
#cp-name { font-size: 20px; font-weight: 700; letter-spacing: 2px; color: #7cd4ff; text-transform: uppercase; }
#cp-subtitle { font-size: 10px; color: rgba(140,180,240,0.55); letter-spacing: 2px; margin-top: 4px; }

#cp-stats-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; padding: 18px 20px;
  border-bottom: 1px solid rgba(60,120,220,0.18);
}
.cp-stat-card {
  padding: 12px 14px; border-radius: 12px;
  background: rgba(20,40,80,0.38);
  border: 1px solid rgba(80,140,255,0.18);
}
.cp-stat-val { font-size: 22px; font-weight: 700; color: #5bf; letter-spacing: 1px; }
.cp-stat-lbl { font-size: 9px; color: rgba(140,180,240,0.55); letter-spacing: 1.8px; text-transform: uppercase; margin-top: 3px; }

.cp-section { padding: 14px 20px; border-bottom: 1px solid rgba(60,120,220,0.12); }
.cp-section-title {
  font-size: 9px; font-weight: 700; letter-spacing: 2.5px;
  text-transform: uppercase; color: rgba(100,160,255,0.6); margin-bottom: 10px;
}
.cp-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 8px;
  background: rgba(15,30,60,0.4); margin-bottom: 6px;
  border: 1px solid rgba(60,120,200,0.15);
  font-size: 11px; color: #c8d8f0;
}
.cp-item-icon { font-size: 15px; flex-shrink: 0; }
.cp-item-name { flex: 1; font-weight: 600; letter-spacing: 0.5px; }
.cp-item-tag {
  font-size: 8px; padding: 3px 7px; border-radius: 999px;
  font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase;
}
.tag-live { background: rgba(255,60,60,0.18); color: #ff7070; border: 1px solid rgba(255,60,60,0.3); }
.tag-active { background: rgba(0,255,120,0.12); color: #40ff90; border: 1px solid rgba(0,255,120,0.25); }
.tag-orbit { background: rgba(80,200,255,0.12); color: #60ccff; border: 1px solid rgba(80,200,255,0.25); }
.tag-nuclear { background: rgba(255,200,0,0.12); color: #ffd050; border: 1px solid rgba(255,200,0,0.25); }
.tag-naval { background: rgba(60,120,255,0.15); color: #80a0ff; border: 1px solid rgba(60,120,255,0.3); }
.tag-military { background: rgba(180,80,255,0.12); color: #c880ff; border: 1px solid rgba(180,80,255,0.25); }

.cp-empty { font-size: 10px; color: rgba(120,160,220,0.35); font-style: italic; padding: 4px 0; }

/* ── EMOJI ON GLOBE ── */
.globe-emoji {
  font-size: 16px; line-height: 1;
  transform: translate(-50%,-50%) scale(var(--emoji-scale,1));
  opacity: var(--emoji-opacity,1);
  user-select: none; pointer-events: none; will-change: transform,opacity;
}

/* ── SATELLITE ORBIT ANIMATION ── */
@keyframes orbitPulse { 0%,100%{opacity:0.7} 50%{opacity:1} }
.sat-label { animation: orbitPulse 2s ease-in-out infinite; }

@media (max-width: 760px) {
  #logo { left: 16px; top: 14px; }
  #layer-panel { top: auto; bottom: 78px; left: 16px; right: 16px; width: auto; }
  .layer-tile { padding: 10px 12px; }
  #stats-bar { padding: 8px 14px; gap: 18px; overflow-x: auto; }
  #country-panel { width: 100vw; right: -100vw; }
}
</style>

  endLng: s.lng + 60,
  altitude: Math.min(0.25, 0.04 + (s.alt / 40000) * 0.22),
  duration: 3200 + i * 180,
  color: ['rgba(160,216,255,0.55)', 'rgba(100,180,255,0.15)'],
  isSatOrbit: true,
}));

// ══════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════
function toRadians(v) { return v * Math.PI / 180; }

function normalizeCountryKey(v) {
  return String(v || '').normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-zA-Z0-9]+/g,' ').trim().toLowerCase();
}

function canonicalCountryName(v) {
  const k = normalizeCountryKey(v);
  return countryAliases.get(k) || v || 'Nieznany kraj';
}

function getFeatureCountryKey(f) {
  return normalizeCountryKey(canonicalCountryName(f?.properties?.ADMIN || f?.properties?.name || ''));
}

function isSelectedFeature(f) {
  return Boolean(selectedCountryKey) && getFeatureCountryKey(f) === selectedCountryKey;
}

function getAngularDistance(la, lna, lb, lnb) {
  const a1 = toRadians(la), a2 = toRadians(lb), dl = toRadians(lna - lnb);
  return Math.acos(Math.min(1, Math.max(-1, Math.sin(a1)*Math.sin(a2) + Math.cos(a1)*Math.cos(a2)*Math.cos(dl))));
}

function getVisiblePoints() {
  return Object.entries(layerConfig).filter(([k]) => layerState[k]).flatMap(([,c]) => c.data);
}

function getCountryPoints(label) {
  const key = normalizeCountryKey(label);
  return allDataPoints.filter(p => normalizeCountryKey(canonicalCountryName(p.country)) === key);
}

function flattenCoords(coords, out) {
  if (!Array.isArray(coords) || !coords.length) return;
  if (typeof coords[0] === 'number') { out.push({ lng:coords[0], lat:coords[1] }); return; }
  coords.forEach(c => flattenCoords(c, out));
}

function getFeatureCenter(feature) {
  const pts = [];
  flattenCoords(feature?.geometry?.coordinates, pts);
  if (!pts.length) return null;
  const s = pts.reduce((a,p) => { a.lat+=p.lat; a.lng+=p.lng; return a; }, {lat:0,lng:0});
  return { lat: s.lat/pts.length, lng: s.lng/pts.length };
}

function pointLabel(d) {
  const cfg = layerConfig[d.type];
  let extra = '';
  if (d.pop) extra = ` · ${d.pop}`;
  else if (d.viewers) extra = ` · ${d.viewers} widzów`;
  else if (d.branch) extra = ` · ${d.branch}`;
  else if (d.class) extra = ` · ${d.class}`;
  else if (d.mw) extra = ` · ${d.mw} MW`;
  else if (d.orbit) extra = ` · ${d.orbit} ${d.alt}km`;
  return `<div style="background:rgba(5,10,30,0.92);border:1px solid ${cfg.color};padding:6px 12px;border-radius:6px;font-family:'Courier New',monospace;font-size:11px;color:#c8d8f0;">
    <b style="color:${cfg.color}">${cfg.emoji} ${d.name}</b><br>
    <span style="color:rgba(150,180,220,0.7);font-size:9px">${d.country}${extra}</span></div>`;
}

// ══════════════════════════════════════════════
//  GLOBE INIT
// ══════════════════════════════════════════════
const globe = Globe()(document.getElementById('globe-container'))
  .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
  .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
  .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
  .showAtmosphere(true)
  .atmosphereColor('#3a8aff')
  .atmosphereAltitude(0.18)
  .polygonsData([])
  .polygonCapColor(f => isSelectedFeature(f) ? 'rgba(61,164,255,0.42)' : 'rgba(30,60,120,0.3)')
  .polygonSideColor(f => isSelectedFeature(f) ? 'rgba(38,111,222,0.28)' : 'rgba(20,40,100,0.15)')
  .polygonStrokeColor(f => isSelectedFeature(f) ? 'rgba(160,228,255,0.95)' : 'rgba(80,160,255,0.45)')
  .polygonAltitude(f => isSelectedFeature(f) ? 0.025 : 0.008)
  .polygonLabel(({properties:d}) => `<div style="background:rgba(5,10,30,0.92);border:1px solid rgba(80,160,255,0.4);padding:6px 12px;border-radius:6px;font-family:'Courier New',monospace;font-size:12px;color:#c8d8f0;"><b style="color:#5bf">${canonicalCountryName(d.ADMIN||d.name||'')}</b></div>`)
  .onPolygonClick(f => selectCountry(f))
  .pointsData([])
  .pointLat('lat').pointLng('lng')
  .pointAltitude(d => layerConfig[d.type].pointAltitude)
  .pointRadius(d => layerConfig[d.type].pointRadius)
  .pointColor(d => layerConfig[d.type].color)
  .pointResolution(12)
  .pointLabel(pointLabel)
  .htmlElementsData([])
  .htmlLat('lat').htmlLng('lng')
  .htmlAltitude(d => layerConfig[d.type].pointAltitude + layerConfig[d.type].labelAltitude)
  .htmlElement(d => {
    const el = document.createElement('div');
    el.className = 'globe-emoji';
    el.textContent = layerConfig[d.type].emoji;
    d._emojiElement = el;
    return el;
  })
  .arcsData([])
  .arcStartLat('startLat').arcStartLng('startLng')
  .arcEndLat('endLat').arcEndLng('endLng')
  .arcColor('color')
  .arcAltitude('altitude')
  .arcStroke(d => d.isSatOrbit ? 0.4 : 0.85)
  .arcDashLength(d => d.isSatOrbit ? 0.18 : 0.52)
  .arcDashGap(d => d.isSatOrbit ? 0.82 : 1.4)
  .arcDashInitialGap(() => Math.random())
  .arcDashAnimateTime(d => d.duration)
  .ringsData([])
  .ringLat('lat').ringLng('lng')
  .ringColor(d => d.color)
  .ringMaxRadius(d => d.maxRadius)
  .ringPropagationSpeed(d => d.speed)
  .ringRepeatPeriod(600);

globe.controls().autoRotate = true;
globe.controls().autoRotateSpeed = 0.4;
globe.controls().enableDamping = true;
globe.pointOfView({ lat:20, lng:15, altitude:2.0 });

function resize() { globe.width(window.innerWidth).height(window.innerHeight); }
window.addEventListener('resize', resize);
resize();

// ══════════════════════════════════════════════
//  EMOJI SCALE LOOP
// ══════════════════════════════════════════════
function updateEmojiScale() {
  const pov = globe.pointOfView();
  const altF = Math.max(0.82, Math.min(1.15, 1.16 - ((pov.altitude ?? 2) - 2) * 0.08));
  getVisiblePoints().forEach(p => {
    if (!p._emojiElement) return;
    const angle = getAngularDistance(p.lat, p.lng, pov.lat, pov.lng);
    const vis = Math.max(0, Math.cos(angle));
    p._emojiElement.style.setProperty('--emoji-scale', ((0.5 + vis * 0.7) * altF).toFixed(3));
    p._emojiElement.style.setProperty('--emoji-opacity', (0.18 + vis * 0.82).toFixed(3));
  });
}
(function loop() { updateEmojiScale(); requestAnimationFrame(loop); })();

// ══════════════════════════════════════════════
//  LAYER UPDATE
// ══════════════════════════════════════════════
function updateLayers() {
  const pts = getVisiblePoints();
  globe.pointsData(pts);
  globe.htmlElementsData(pts);
  // satellite orbits visible only when satellite layer on
  const arcs = layerState.satellite ? [...satOrbitArcs] : [];
  globe.arcsData(arcs);
  syncLayerButtons();
  requestAnimationFrame(updateEmojiScale);
  updateStatsBar();
}

function syncLayerButtons() {
  document.querySelectorAll('.layer-tile').forEach(btn => {
    const k = btn.dataset.layer;
    const on = layerState[k];
    btn.classList.toggle('is-off', !on);
    btn.classList.toggle('is-on', on);
    btn.setAttribute('aria-pressed', String(on));
    const s = btn.querySelector('.tile-state');
    if (s) s.textContent = on ? 'ON' : 'OFF';
  });
}

function updateStatsBar() {
  countryStatsBar.capitals.textContent = layerState.capital ? capitals.length : 0;
  countryStatsBar.cities.textContent = layerState.city ? bigCities.length : 0;
  countryStatsBar.cameras.textContent = layerState.camera ? liveCameras.length : 0;
  countryStatsBar.airports.textContent = layerState.airport ? airports.length : 0;
  countryStatsBar.military.textContent = layerState.military ? militaryBases.length : 0;
  countryStatsBar.naval.textContent = layerState.naval ? navalFleets.length : 0;
  countryStatsBar.nuclear.textContent = layerState.nuclear ? nuclearPlants.length : 0;
  countryStatsBar.satellites.textContent = layerState.satellite ? satellites.length : 0;
}

// ══════════════════════════════════════════════
//  COUNTRY PANEL
// ══════════════════════════════════════════════
function buildDetailSection(title, items, renderFn) {
  if (!items.length) return '';
  const rows = items.map(renderFn).join('');
  return `<div class="cp-section"><div class="cp-section-title">${title}</div>${rows}</div>`;
}

function openCountryPanel(label) {
  const pts = getCountryPoints(label);
  const flag = flagMap[label] || '🌐';

  cpFlag.textContent = flag;
  cpName.textContent = label;
  cpSubtitle.textContent = `${pts.length} obiektów w bazie danych`;

  cpStatEls.capitals.textContent   = pts.filter(p=>p.type==='capital').length;
  cpStatEls.cities.textContent     = pts.filter(p=>p.type==='city').length;
  cpStatEls.cameras.textContent    = pts.filter(p=>p.type==='camera').length;
  cpStatEls.airports.textContent   = pts.filter(p=>p.type==='airport').length;
  cpStatEls.military.textContent   = pts.filter(p=>p.type==='military').length;
  cpStatEls.naval.textContent      = pts.filter(p=>p.type==='naval').length;
  cpStatEls.nuclear.textContent    = pts.filter(p=>p.type==='nuclear').length;
  cpStatEls.satellites.textContent = pts.filter(p=>p.type==='satellite').length;

  let html = '';

  html += buildDetailSection('📹 KAMERY LIVE', pts.filter(p=>p.type==='camera'), p =>
    `<div class="cp-item"><span class="cp-item-icon">📹</span><span class="cp-item-name">${p.name}</span><span class="cp-item-tag tag-live">LIVE ${p.viewers}</span></div>`);

  html += buildDetailSection('🛫 LOTNISKA', pts.filter(p=>p.type==='airport'), p =>
    `<div class="cp-item"><span class="cp-item-icon">🛫</span><span class="cp-item-name">${p.name}</span><span class="cp-item-tag tag-active">ACTIVE</span></div>`);

  html += buildDetailSection('⚓ BAZY WOJSKOWE', pts.filter(p=>p.type==='military'), p =>
    `<div class="cp-item"><span class="cp-item-icon">⚓</span><span class="cp-item-name">${p.name}</span><span class="cp-item-tag tag-military">${p.branch}</span></div>`);

  html += buildDetailSection('🌊 FLOTA MORSKA', pts.filter(p=>p.type==='naval'), p =>
    `<div class="cp-item"><span class="cp-item-icon">🌊</span><span class="cp-item-name">${p.name}</span><span class="cp-item-tag tag-naval">${p.class}</span></div>`);

  html += buildDetailSection('☢️ ELEKTROWNIE JĄDROWE', pts.filter(p=>p.type==='nuclear'), p =>
    `<div class="cp-item"><span class="cp-item-icon">☢️</span><span class="cp-item-name">${p.name}</span><span class="cp-item-tag tag-nuclear">${p.status==='active'?'ONLINE':'OFFLINE'} ${p.mw}MW</span></div>`);

  html += buildDetailSection('🛰️ SATELITY', pts.filter(p=>p.type==='satellite'), p =>
    `<div class="cp-item"><span class="cp-item-icon">🛰️</span><span class="cp-item-name">${p.name}</span><span class="cp-item-tag tag-orbit">${p.orbit} ${p.alt}km</span></div>`);

  if (!html) html = '<div class="cp-section"><p class="cp-empty">Brak szczegółowych danych dla tego kraju.</p></div>';

  cpDetails.innerHTML = html;
  cpPanel.classList.add('visible');
}

function closeCountryPanel() {
  cpPanel.classList.remove('visible');
}

cpClose.addEventListener('click', () => {
  closeCountryPanel();
  selectedCountryKey = '';
  selectedCountryLabel = '';
  selectedCountryNameElement.textContent = 'Kliknij kraj';
  refreshCountryHighlight();
});

// ══════════════════════════════════════════════
//  SELECT COUNTRY
// ══════════════════════════════════════════════
function refreshCountryHighlight() { globe.polygonsData(countryFeatures); }

function selectCountry(feature) {
  if (!feature) return;
  const clickedKey   = getFeatureCountryKey(feature);
  const clickedLabel = canonicalCountryName(feature.properties?.ADMIN || feature.properties?.name || '');

  if (sendModeActive) {
    selectedCountryKey = clickedKey;
    selectedCountryLabel = clickedLabel;
    selectedCountryNameElement.textContent = clickedLabel;
    refreshCountryHighlight();
    sendFlightToCountry(feature);
    return;
  }

  if (selectedCountryKey === clickedKey) {
    selectedCountryKey = '';
    selectedCountryLabel = '';
    selectedCountryNameElement.textContent = 'Kliknij kraj';
    closeCountryPanel();
  } else {
    selectedCountryKey = clickedKey;
    selectedCountryLabel = clickedLabel;
    selectedCountryNameElement.textContent = clickedLabel;
    openCountryPanel(clickedLabel);
  }
  refreshCountryHighlight();
}

// ══════════════════════════════════════════════
//  FLIGHT SYSTEM
// ══════════════════════════════════════════════
function setSendMode(active) {
  sendModeActive = active;
  sendFlightButton.classList.toggle('is-active', active);
  sendFlightButton.textContent = active ? 'Target' : 'Send';
  airportSendStatusElement.textContent = active ? 'Kliknij kraj docelowy' : 'Tryb standardowy';
}

function addLandingEffect(dest) {
  const ring = { id:`l-${Date.now()}`, lat:dest.lat, lng:dest.lng, maxRadius:4.5, speed:2.6, color:t=>`rgba(126,233,255,${Math.max(0,0.72*(1-t))})` };
  activeLandings.push(ring);
  globe.ringsData([...activeLandings]);
  setTimeout(() => {
    const i = activeLandings.findIndex(r => r.id === ring.id);
    if (i !== -1) { activeLandings.splice(i,1); globe.ringsData([...activeLandings]); }
  }, 1700);
}

function sendFlightToCountry(feature) {
  const dest = getFeatureCenter(feature);
  if (!dest) { setSendMode(false); return; }
  const flight = {
    id: `f-${Date.now()}`, startLat:flightOrigin.lat, startLng:flightOrigin.lng,
    endLat:dest.lat, endLng:dest.lng, altitude:0.31, duration:2600,
    color:['#74dcff','#ffffff'],
  };
  activeFlights.push(flight);
  // merge with satellite orbits
  globe.arcsData([...(layerState.satellite ? satOrbitArcs : []), ...activeFlights]);
  setTimeout(() => {
    const i = activeFlights.findIndex(f => f.id === flight.id);
    if (i !== -1) { activeFlights.splice(i,1); globe.arcsData([...(layerState.satellite ? satOrbitArcs : []), ...activeFlights]); addLandingEffect(dest); }
  }, flight.duration + 120);
  setSendMode(false);
}

// ══════════════════════════════════════════════
//  LAYER BUTTON WIRING
// ══════════════════════════════════════════════
document.querySelectorAll('.layer-tile').forEach(btn => {
  btn.addEventListener('click', () => {
    const k = btn.dataset.layer;
    layerState[k] = !layerState[k];
    if (k === 'airport' && !layerState[k]) setSendMode(false);
    updateLayers();
  });
  btn.addEventListener('keydown', e => {
    if ((e.key==='Enter'||e.key===' ') && btn.tagName!=='BUTTON') { e.preventDefault(); btn.click(); }
  });
});

sendFlightButton.addEventListener('click', e => {
  e.stopPropagation();
  if (!layerState.airport) { layerState.airport = true; updateLayers(); }
  setSendMode(!sendModeActive);
});

// ══════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════
updateLayers();

fetch('https://raw.githubusercontent.com/vasturiano/globe.gl/master/example/datasets/ne_110m_admin_0_countries.geojson')
  .then(r => r.json())
  .then(data => { countryFeatures = data.features; refreshCountryHighlight(); })
  .catch(() => {});

</script>
</body>
</html>
